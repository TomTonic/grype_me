---
name: CI / Docker

'on':
  workflow_call:

permissions:
  contents: read

jobs:
  docker:
    name: Docker Build + Integration Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image (for integration test)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: false
          load: true
          tags: grype_me:local-test
          cache-from: type=gha,scope=grype_me
          cache-to: type=gha,mode=max,scope=grype_me

      - name: Run integration test (published-container simulation)
        id: grype-scan
        uses: ./.github/actions/run-grype-me-container
        with:
          image-ref: grype_me:local-test
          pull: 'false'
          # grype_me input parameters:
          scan: head
          output-file: grype-results.json
          variable-prefix: GRYPE_
          fail-build: 'false'
          severity-cutoff: medium
          only-fixed: 'false'
          db-update: 'false'
          debug: 'false'
          outputs-file: github_output_ci.txt

      - name: Privilege mode smoke test (default mode)
        id: privilege-default
        uses: ./.github/actions/run-grype-me-container
        with:
          image-ref: grype_me:local-test
          pull: 'false'
          scan: head
          output-file: grype-results-priv-default.json
          variable-prefix: GRYPE_PRIV_DEFAULT_
          fail-build: 'false'
          severity-cutoff: medium
          only-fixed: 'false'
          db-update: 'false'
          debug: 'false'
          strict-privilege-drop: 'false'
          outputs-file: github_output_priv_default.txt

      - name: Assert privilege output (default mode)
        shell: bash
        run: |
          set -euo pipefail
          mode='${{ steps.privilege-default.outputs.runtime-privilege }}'
          if [[ -z "$mode" ]]; then
            echo "runtime-privilege output is missing in default mode" >&2
            exit 1
          fi
          if [[ "$mode" != "dropped" && "$mode" != "already-non-root" && "$mode" != "root-fallback" ]]; then
            echo "Unexpected runtime-privilege value: $mode" >&2
            exit 1
          fi

      - name: Privilege mode smoke test (strict mode)
        id: privilege-strict
        uses: ./.github/actions/run-grype-me-container
        with:
          image-ref: grype_me:local-test
          pull: 'false'
          scan: head
          output-file: grype-results-priv-strict.json
          variable-prefix: GRYPE_PRIV_STRICT_
          fail-build: 'false'
          severity-cutoff: medium
          only-fixed: 'false'
          db-update: 'false'
          debug: 'false'
          strict-privilege-drop: 'true'
          outputs-file: github_output_priv_strict.txt

      - name: Assert privilege output (strict mode)
        shell: bash
        run: |
          set -euo pipefail
          mode='${{ steps.privilege-strict.outputs.runtime-privilege }}'
          if [[ "$mode" != "dropped" && "$mode" != "already-non-root" ]]; then
            echo "Strict mode requires non-root runtime, got: $mode" >&2
            echo "Detail: ${{ steps.privilege-strict.outputs.runtime-privilege-detail }}" >&2
            exit 1
          fi

      - name: Results preview
        run: head -50 grype-results.json || true

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: grype-scan-results
          path: grype-results.json
          retention-days: 7
