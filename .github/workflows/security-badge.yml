---
name: Refresh grype_me Security Badges

on:
  schedule:
    - cron: '0 8 * * *' # every day at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Ensure required secrets and variables are set
        shell: bash
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ vars.GRYPE_BADGE_GIST_ID }}
        run: |
          set -euo pipefail
          if [[ -z "$GIST_TOKEN" ]]; then
            echo "Missing required secret: GIST_TOKEN" >&2
            exit 1
          fi
          if [[ -z "$GIST_ID" ]]; then
            echo "Missing required repository variable: GRYPE_BADGE_GIST_ID" >&2
            exit 1
          fi

      - name: Checkout repository (with tags)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # fetch-depth: 0 (non-default) - fetch full history to ensure tag lookups work correctly
          fetch-depth: 0
          # fetch-tags: true (non-default) - need tags to detect latest_release for the badge
          fetch-tags: true

      # Optional diagnostic step: warns when the moving action tag (@v1) and the
      # currently published GHCR image behind v1 appear to drift in semantic version.
      - name: Check action/container coherence for moving tag v1 (warning only)
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            try {
              const ownerInfo = await github.rest.users.getByUsername({ username: context.repo.owner });
              const ownerType = ownerInfo.data.type || 'User';

              const latestRelease = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              const latestActionVersion = String(latestRelease.data.tag_name || '')
                .replace(/^v/, '')
                .replace(/-release$/, '');

              const listParams = {
                package_type: 'container',
                package_name: context.repo.repo,
                per_page: 100,
              };

              let versions = [];
              if (ownerType === 'Organization') {
                listParams.org = context.repo.owner;
                versions = await github.paginate(
                  github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
                  listParams
                );
              } else {
                listParams.username = context.repo.owner;
                versions = await github.paginate(
                  github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
                  listParams
                );
              }

              const v1Version = versions.find((version) =>
                (version.metadata?.container?.tags || []).includes('v1')
              );
              if (!v1Version) {
                core.warning('Could not find GHCR package version carrying moving tag v1.');
                return;
              }

              const tags = v1Version.metadata?.container?.tags || [];
              const semverTag = tags.find((tag) => /^v\d+\.\d+\.\d+$/.test(tag));
              if (!semverTag) {
                core.warning(`Could not infer action semver from v1 package tags: ${tags.join(', ')}`);
                return;
              }

              const v1ActionVersion = semverTag.replace(/^v/, '');
              core.info(`Latest action release: ${latestActionVersion}`);
              core.info(`Container behind moving tag v1 appears to be: ${v1ActionVersion}`);

              if (latestActionVersion !== v1ActionVersion) {
                core.warning([
                  `Version drift detected: action release is ${latestActionVersion},`,
                  `but GHCR moving tag v1 points to ${v1ActionVersion}.`,
                  'Users of TomTonic/grype_me@v1 may run an image that does not match the latest action metadata.',
                  'Update plugin references or republish/move tags so metadata and container are aligned.'
                ].join(' '));
              }
            } catch (error) {
              core.warning(`Could not complete action/container coherence check: ${error.message}`);
            }

      - name: Scan latest release of GitHub Action
        id: grype_me_release
        uses: TomTonic/grype_me@ef37fca1c0ceaa98c9e6c39c0b0c44225d6357b8 # v1
        with:
          scan: 'latest_release'
          description: |
            Automated nightly scan of the latest stable release tag of this action's code.
            This report powers the "Vulnerabilities of Action" badge in README.
          fail-build: false
          gist-token: ${{ secrets.GIST_TOKEN }}
          gist-id: ${{ vars.GRYPE_BADGE_GIST_ID }}
          gist-filename: 'grype_me-action_release'

      - name: Scan nightly Docker image
        id: grype_me_image
        uses: TomTonic/grype_me@ef37fca1c0ceaa98c9e6c39c0b0c44225d6357b8 # v1
        with:
          image: ghcr.io/tomtonic/grype_me:latest
          image-source: registry
          description: |
            Automated nightly scan of the daily published Docker image
            `ghcr.io/tomtonic/grype_me:latest`. This image is used by this
            action to actually scan your artifacts. This report powers the
            "Vulnerabilities of DockerImage" badge in README.
          fail-build: false
          gist-token: ${{ secrets.GIST_TOKEN }}
          gist-id: ${{ vars.GRYPE_BADGE_GIST_ID }}
          gist-filename: 'grype_me-docker_image'
